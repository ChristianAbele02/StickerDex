# electron-builder configuration for the StickerDex Windows desktop app.
# Produces a per-user NSIS installer (no admin elevation) + a portable .exe.
appId: com.christianabele.stickerdex
productName: StickerDex
copyright: © 2026 Christian Abele and contributors

directories:
  output: dist

# Only ship the esbuilt glue + manifest. Production npm deps (better-sqlite3,
# fastify, …) are pulled in automatically by electron-builder; everything else
# was bundled by esbuild.
files:
  - build/**/*
  - package.json

# Bundled SPA + datasets live OUTSIDE the asar (real files on disk) so the
# embedded Fastify static server and JSON readers work without asar quirks.
extraResources:
  - from: resources/web
    to: web
  - from: resources/data
    to: data
  - from: resources/icon.ico
    to: icon.ico

asar: true
# Native module must be unpacked from the asar to be loadable.
asarUnpack:
  - "**/*.node"
# Do NOT let electron-builder rebuild native deps: in this monorepo it walks up
# to the workspace root and rebuilds the backend's better-sqlite3 (wrong copy,
# wrong ABI, and a source build fails on the space in the user path). Instead we
# pre-build *desktop's own* better-sqlite3 for Electron (scripts/rebuild-native)
# before packaging, and electron-builder just bundles the ready binary.
npmRebuild: false

win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: StickerDex
  uninstallDisplayName: StickerDex ${version}
  artifactName: ${productName}-Setup-${version}.${ext}

portable:
  artifactName: ${productName}-${version}-portable.${ext}

publish:
  provider: github
  owner: ChristianAbele02
  repo: StickerDex
