name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate sticker dataset
        run: npm run generate-dataset

      - name: Type-check (lint)
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build API image
        run: docker build -f backend/Dockerfile -t stickerdex-api .
      - name: Build web image
        run: docker build -f frontend/Dockerfile -t stickerdex-web .
